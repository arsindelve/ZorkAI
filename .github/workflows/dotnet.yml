name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  dotnet-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore .NET dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: .NET tests
      run: dotnet test --no-build --verbosity normal

  zork-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install workspace dependencies
      run: npm ci --legacy-peer-deps

    - name: Get Playwright version
      id: playwright-version
      working-directory: ./zorkweb.client
      run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

    - name: Cache Playwright browsers
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

    # Browser binaries are restored from cache on a hit (download skipped); --with-deps still
    # installs the apt system libraries each run. timeout + retry guards against a stalled
    # download from cdn.playwright.dev hanging the job indefinitely (see no-timeout incident).
    - name: Install Playwright browsers
      working-directory: ./zorkweb.client
      run: |
        for attempt in 1 2 3; do
          echo "::group::npx playwright install --with-deps (attempt $attempt)"
          if timeout -k 30 600 npx playwright install --with-deps; then
            echo "::endgroup::"
            exit 0
          fi
          echo "::endgroup::"
          echo "playwright install attempt $attempt failed or stalled; retrying in 10s..."
          sleep 10
        done
        echo "::error::playwright install --with-deps failed after 3 attempts"
        exit 1

    - name: Playwright tests
      working-directory: ./zorkweb.client
      run: npx playwright test

    - name: Upload Playwright test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: zorkweb-playwright-report
        path: zorkweb.client/playwright-report/
        retention-days: 30

    - name: UI Unit tests
      working-directory: ./zorkweb.client
      run: npx jest

  planetfallweb-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install workspace dependencies
      run: npm ci --legacy-peer-deps

    - name: Get Playwright version
      id: playwright-version
      working-directory: ./planetfallweb.client
      run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

    - name: Cache Playwright browsers
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

    # Browser binaries are restored from cache on a hit (download skipped); --with-deps still
    # installs the apt system libraries each run. timeout + retry guards against a stalled
    # download from cdn.playwright.dev hanging the job indefinitely (see no-timeout incident).
    - name: Install Playwright browsers
      working-directory: ./planetfallweb.client
      run: |
        for attempt in 1 2 3; do
          echo "::group::npx playwright install --with-deps (attempt $attempt)"
          if timeout -k 30 600 npx playwright install --with-deps; then
            echo "::endgroup::"
            exit 0
          fi
          echo "::endgroup::"
          echo "playwright install attempt $attempt failed or stalled; retrying in 10s..."
          sleep 10
        done
        echo "::error::playwright install --with-deps failed after 3 attempts"
        exit 1

    - name: Playwright tests
      working-directory: ./planetfallweb.client
